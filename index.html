<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phoenix QuickScore — Intake</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#050505;
      --bg-soft:#0b0b0c;
      --panel:#0d0f13;
      --panel-2:#11141a;
      --text:#f3f4f6;
      --muted:#a8afb8;
      --muted-2:#7f8791;
      --gold:#c9a227;
      --line:#232831;
      --line-2:#1b1f26;
      --blue-glow:rgba(49,95,188,0.16);

      --green-soft: rgba(57,140,89,0.16);
      --green-border: rgba(57,140,89,0.30);

      --amber-soft: rgba(184,134,11,0.16);
      --amber-border: rgba(184,134,11,0.30);

      --red-soft: rgba(170,72,72,0.16);
      --red-border: rgba(170,72,72,0.30);

      --blue-soft: rgba(68,115,255,0.16);
      --blue-border: rgba(68,115,255,0.24);

      --shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    *{box-sizing:border-box;margin:0;padding:0;}

    html, body{
      width:100%;
      min-height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:"Inter", Arial, sans-serif;
    }

    body{
      background:
        radial-gradient(circle at 50% 18%, rgba(201,162,39,0.08) 0%, rgba(201,162,39,0.02) 18%, rgba(0,0,0,0) 44%),
        radial-gradient(circle at 50% 58%, var(--blue-glow) 0%, rgba(49,95,188,0.05) 24%, rgba(0,0,0,0) 58%),
        linear-gradient(180deg, #090909 0%, #060606 100%);
    }

    .page{
      position:relative;
      min-height:100vh;
      overflow:hidden;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.015) 0, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 100%),
        linear-gradient(180deg, rgba(255,255,255,0.015) 0, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 100%);
      background-size:120px 120px;
    }

    .seal{
      position:absolute;
      top:30px;
      left:36px;
      width:112px;
      opacity:0.96;
    }

    .system-label{
      position:absolute;
      top:42px;
      left:50%;
      transform:translateX(-50%);
      text-align:center;
    }

    .system-kicker{
      font-family:"Cinzel", serif;
      font-size:13px;
      letter-spacing:0.26em;
      text-transform:uppercase;
      color:#cfd4da;
    }

    .shell{
      width:min(1380px, 94vw);
      margin:0 auto;
      padding:120px 0 40px;
    }

    .hero{text-align:center;margin-bottom:34px;}

    .headline{
      font-family:"Cinzel", serif;
      font-size:clamp(26px, 2.6vw, 44px);
      text-transform:uppercase;
      margin-bottom:18px;
    }

    .subline{
      font-size:clamp(16px, 1.15vw, 20px);
      color:var(--muted);
      max-width:860px;
      margin:0 auto;
    }

    .workspace{
      display:grid;
      grid-template-columns:minmax(0, 1fr) 320px;
      gap:28px;
    }

    .main-panel{
      background:rgba(255,255,255,0.02);
      border:1px solid var(--line);
      padding:28px;
      box-shadow:var(--shadow);
    }

    .section{
      border:1px solid var(--line);
      background:rgba(255,255,255,0.02);
      padding:22px;
      margin-bottom:18px;
    }

    input, select, textarea{
      width:100%;
      border:1px solid var(--line);
      background:rgba(255,255,255,0.03);
      color:var(--text);
      border-radius:12px;
      padding:14px;
    }

    /* 🔥 HIGH IMPACT CSS ADDITIONS */

    .cta{
      border:1px solid var(--gold);
      padding:16px;
      text-transform:uppercase;
      font-family:"Cinzel", serif;
      cursor:pointer;
      transition: all .2s ease;
    }

    .cta:hover{
      background:var(--gold);
      color:#111;
    }

    .cta:active{
      transform:scale(0.97);
    }

    .cta.loading{
      opacity:0.7;
      pointer-events:none;
    }

    .score-number{
      font-family:"Cinzel", serif;
      font-size:60px;
      transition: all .4s ease;
    }

    .score-number.active{
      transform:scale(1.08);
      text-shadow:0 0 20px rgba(201,162,39,0.3);
    }

    .pill, .band-pill{
      transition: all .25s ease;
    }

    .pill.updated, .band-pill.updated{
      box-shadow:0 0 14px rgba(201,162,39,0.25);
    }

    .cta-note{
      transition: opacity .3s ease;
    }

  </style>
</head>

<body>

<button id="submit-btn" class="cta">Generate QuickScore →</button>

<div id="pqs-score" class="score-number">--</div>

<script>
async function generateQuickScoreAndContinue(){

  const btn = document.getElementById("submit-btn");
  btn.classList.add("loading");
  btn.innerText = "Generating...";

  try{

    const res = await fetch("https://phoenix-pqs-gateway.tsteelefpa.workers.dev/",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        email:"test@test.com",
        revenue_band:"100k+",
        revenue_consistency:"consistent",
        operations_structure:"structured",
        team_structure:"team",
        offer_structure:"clear",
        acquisition_channel:"predictable"
      })
    });

    const data = await res.json();

    const scoreEl = document.getElementById("pqs-score");

    scoreEl.innerText = data.score;
    scoreEl.classList.add("active");

    setTimeout(()=>{
      window.location.href="https://buy.stripe.com/eVq7sL7Uc2Mcdeu189fYY0d";
    },1200);

  }catch(e){
    alert("Error. Try again.");
  }

  btn.classList.remove("loading");
  btn.innerText="Generate QuickScore →";
}

document.getElementById("submit-btn").addEventListener("click", generateQuickScoreAndContinue);
</script>

</body>
</html>
